<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haloa | Concierge Noa</title>
<meta name="description" content="会いに来てくださって、ありがとうございます。Haloaコンシェルジュのノアが、あなたのお話を聞くところから始めます。">

<meta property="og:type" content="website">
<meta property="og:url" content="https://languag-masamomo.github.io/noa-avatar/">
<meta property="og:title" content="Haloa | Concierge Noa">
<meta property="og:description" content="会いに来てくださって、ありがとうございます。Haloaコンシェルジュのノアが、あなたのお話を聞くところから始めます。">
<meta property="og:image" content="https://languag-masamomo.github.io/noa-avatar/noa-smile.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Haloa | Concierge Noa">
<meta name="twitter:description" content="会いに来てくださって、ありがとうございます。Haloaコンシェルジュのノアが、あなたのお話を聞くところから始めます。">
<meta name="twitter:image" content="https://languag-masamomo.github.io/noa-avatar/noa-smile.png">

<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="brand">
    <div class="brand-name">Haloa</div>
    <div class="brand-sub">Concierge&nbsp;Noa</div>
  </header>

  <main class="stage">

    <div class="portrait-wrap">
      <img id="noaImg" class="noa-img" src="noa-smile.png" alt="ノア">
      <video
        id="noaVideo"
        class="noa-video"
        muted
        loop
        playsinline
        preload="auto"
      >
        <source src="noa-greeting.mp4.mp4" type="video/mp4">
      </video>
      <div class="glow"></div>
    </div>

    <div id="lineInvite" class="line-invite">
      <p class="line-invite-text">🌿 また会いに来てくださいね</p>
      <a
        id="lineButton"
        class="line-button"
        href="https://lin.ee/ZzOFsq3"
        target="_blank"
        rel="noopener"
      >
        🌿 LINEでノアに会いに行く
      </a>
    </div>

    <div id="messageBubble" class="message-bubble">
      ボタンを押すと、ノアがご挨拶します。
    </div>

    <div class="button-row">
      <button id="meetButton" class="meet-button" type="button">
        ノアに会う
      </button>
      <button id="stopButton" class="action-button secondary" type="button">
        停止
      </button>
    </div>

    <audio id="noaAudio" preload="auto">
      <source src="noa-greeting.mp3" type="audio/mpeg">
    </audio>

  </main>

  <footer class="page-footer">
    &copy; Haloa
  </footer>

  <script src="script.js"></script>
</body>
</html>
